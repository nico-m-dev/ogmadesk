<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OgmaDesk</title>
    <!-- Tailwind CSS v4 Static Build -->
    <link rel="stylesheet" href="css/output.css">

    <!-- Phosphor Icons Local (Regular & Fill weights) -->
    <link rel="stylesheet" href="lib/phosphor/regular/style.css">
    <link rel="stylesheet" href="lib/phosphor/fill/style.css">
</head>

<body class="bg-zinc-900 text-zinc-100 h-screen flex overflow-hidden antialiased selection:bg-amber-500/30">

    <!-- Sidebar -->
    <aside id="sidebar" class="w-64 bg-zinc-950 border-r border-zinc-800 flex flex-col transition-all duration-300">
        <div class="sidebar-header h-14 flex items-center px-4 border-b border-zinc-800 shrink-0">
            <div class="logo-container w-8 h-8 rounded flex items-center justify-center">
                <img src="lib/logo.png" class="w-5 h-5 object-contain">
            </div>
            <h1
                class="font-bold text-lg tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-zinc-100 to-zinc-400">
                OgmaDesk</h1>
            <button id="toggle-sidebar" class="ml-auto text-zinc-400 hover:text-white transition-colors">
                <i class="ph ph-list text-xl"></i>
            </button>
        </div>

        <div class="flex-1 overflow-y-auto py-4 px-3 space-y-1 custom-scrollbar">
            <div class="text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-2 px-2 mt-2">Tools</div>

            <a href="#" data-page="home"
                class="nav-item active flex items-center px-3 py-2 rounded-md text-sm font-medium transition-colors">
                <i class="ph ph-squares-four text-lg mr-3"></i>
                <span class="nav-label">Dashboard</span>
            </a>

            <a href="#" data-page="pdf-suite"
                class="nav-item flex items-center px-3 py-2 rounded-md text-sm font-medium text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800/50 transition-colors">
                <i class="ph ph-file-pdf text-lg mr-3"></i>
                <span class="nav-label">PDF Suite</span>
            </a>

            <a href="#" data-page="file-manager"
                class="nav-item flex items-center px-3 py-2 rounded-md text-sm font-medium text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800/50 transition-colors">
                <i class="ph ph-folder-notch-open text-lg mr-3"></i>
                <span class="nav-label">File Manager</span>
            </a>

            <a href="#" data-page="file-compare"
                class="nav-item flex items-center px-3 py-2 rounded-md text-sm font-medium text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800/50 transition-colors">
                <i class="ph ph-copy text-lg mr-3"></i>
                <span class="nav-label">File Compare</span>
            </a>

            <a href="#" data-page="markdown-editor"
                class="nav-item flex items-center px-3 py-2 rounded-md text-sm font-medium text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800/50 transition-colors">
                <i class="ph ph-markdown-logo text-lg mr-3"></i>
                <span class="nav-label">Markdown</span>
            </a>

            <a href="#" data-page="kanban-notes"
                class="nav-item flex items-center px-3 py-2 rounded-md text-sm font-medium text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800/50 transition-colors">
                <i class="ph ph-kanban text-lg mr-3"></i>
                <span class="nav-label">Kanban Notes</span>
            </a>

            <a href="#" data-page="chart-builder"
                class="nav-item flex items-center px-3 py-2 rounded-md text-sm font-medium text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800/50 transition-colors">
                <i class="ph ph-chart-bar text-lg mr-3"></i>
                <span class="nav-label">Chart Builder</span>
            </a>
        </div>

        <div class="p-3 border-t border-zinc-800 shrink-0 space-y-1">
            <a href="#" data-page="settings"
                class="nav-item flex items-center px-3 py-2 rounded-md text-sm font-medium text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800/50 transition-colors relative">
                <i class="ph ph-gear text-lg mr-3"></i>
                <span class="nav-label">Settings</span>
                <span id="settings-update-badge" class="hidden absolute top-1.5 right-1.5 w-2 h-2 bg-red-500 rounded-full"></span>
            </a>
            <a href="#" data-page="about"
                class="nav-item flex items-center px-3 py-2 rounded-md text-sm font-medium text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800/50 transition-colors">
                <i class="ph ph-info text-lg mr-3"></i>
                <span class="nav-label">About</span>
            </a>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col min-w-0 bg-zinc-900 overflow-hidden relative">
        <!-- Top Bar -->
        <header
            class="h-14 border-b border-zinc-800/80 bg-zinc-900/80 backdrop-blur-md flex items-center px-6 shrink-0 z-10 sticky top-0">
            <div class="flex items-center text-sm font-medium text-zinc-400">
                <i class="ph ph-folder text-lg mr-2 text-amber-500"></i>
                <span id="current-project">No Project Open</span>
            </div>

            <div class="ml-auto flex items-center space-x-3">
                <button id="btn-quick-mode"
                    class="hidden px-3 py-1.5 bg-zinc-800 hover:bg-red-500/20 text-zinc-300 hover:text-red-400 rounded-md text-sm font-medium transition-colors border border-zinc-700 hover:border-red-500/30">
                    Close Workspace
                </button>
                <button id="btn-new-project"
                    class="px-3 py-1.5 bg-zinc-800 hover:bg-zinc-700 text-zinc-200 rounded-md text-sm font-medium transition-colors border border-zinc-700">
                    Main Screen
                </button>
            </div>
        </header>

        <!-- Dynamic Page Content -->
        <div id="main-content" class="flex-1 overflow-auto p-6 custom-scrollbar relative">
            <!-- Content loaded via JS -->
            <div class="flex items-center justify-center h-full">
                <div class="flex flex-col items-center">
                    <i class="ph ph-spinner-gap animate-spin text-4xl text-amber-500 mb-4"></i>
                    <p class="text-zinc-400">Loading OgmaDesk...</p>
                </div>
            </div>
        </div>
    </main>

    <!-- JS Modules -->
    <script src="js/tauri-bridge.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/workspace.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
