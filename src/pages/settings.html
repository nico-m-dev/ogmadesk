<div class="max-w-2xl mx-auto space-y-8 animate-[fade-enter_300ms_ease_forwards]">
    <div>
        <h2 class="text-2xl font-bold text-white mb-1">Settings</h2>
        <p class="text-zinc-400">Manage your OgmaDesk preferences.</p>
    </div>

    <div class="glass-panel overflow-hidden">
        <!-- Application Update -->
        <div class="p-5 border-b border-zinc-700/50">
            <h3 class="text-lg font-medium text-white mb-4">Application Update</h3>
            
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-sm font-medium text-zinc-200">Current Version</p>
                    <p class="text-xs text-zinc-400">Version 0.1.0-alpha</p>
                </div>
                <div class="flex space-x-2">
                    <button id="btn-check-updates" class="px-3 py-1.5 bg-amber-500/10 hover:bg-amber-500/20 text-amber-500 border border-amber-500/20 rounded-md text-sm font-medium transition-colors">
                        Check for Updates
                    </button>
                </div>
            </div>
        </div>

        <!-- Data & Privacy -->
        <div class="p-5">
            <h3 class="text-lg font-medium text-white mb-4">Data & Privacy</h3>
            
            <div class="space-y-4">
                <div class="flex items-start">
                    <i class="ph ph-hard-drives text-xl text-zinc-400 mt-0.5 mr-3"></i>
                    <div>
                        <p class="text-sm font-medium text-zinc-200">Local Storage Only</p>
                        <p class="text-xs text-zinc-400 mt-1">OgmaDesk is designed to never send your data to any external server. All configuration, tool states, and workspace files remain strictly on your local disk.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        const btn = document.getElementById('btn-check-updates');
        if (btn) {
            btn.addEventListener('click', () => {
                if (window.App && window.App.showToast) {
                    window.App.showToast('You are currently using the latest version.', 'success');
                } else {
                    alert('You are currently using the latest version.');
                }
            });
        }
    })();
</script>
