<!-- =====================================================================
     Chart Builder — Main Fragment
     Loaded dynamically by app.js into #main-content.
     ===================================================================== -->

<!-- Local Libraries -->
<script src="/lib/apexcharts/apexcharts.min.js"></script>
<script src="/js/tools/chart-builder/chart-types.js"></script>
<script src="/js/tools/chart-builder/chart-options.js"></script>
<script src="/js/tools/chart-builder/chart-data.js"></script>

<!-- Scoped Styles -->
<!-- Styles migrated to input.css -->

<!-- =====================================================================
     ROOT CONTAINER
     ===================================================================== -->
<div id="cb-root" class="flex flex-col h-full gap-0 animate-[fade-enter_300ms_ease_forwards]">

    <!-- ── Top Toolbar ──────────────────────────────────────────────────── -->
    <div class="cb-toolbar">
        <!-- Chart Name -->
        <div class="cb-toolbar-group">
            <input type="text" id="cb-chart-name" class="bg-zinc-900 border border-zinc-700 text-zinc-200 text-sm px-3 py-1.5 rounded-lg focus:outline-none focus:border-amber-500" placeholder="Chart name...">
        </div>

        <!-- Chart Selector -->
        <div class="cb-toolbar-group">
            <select id="cb-chart-select" class="bg-zinc-900 border border-zinc-700 text-zinc-200 text-sm px-3 py-1.5 rounded-lg focus:outline-none focus:border-amber-500">
            </select>
        </div>

        <!-- Chart Actions -->
        <div class="cb-toolbar-group">
            <button class="cb-btn" id="cb-btn-new" title="Create New Chart">
                <i class="ph ph-plus text-base"></i> New Chart
            </button>
        </div>

        <div class="cb-toolbar-group">
            <button class="cb-btn danger" id="cb-btn-delete" title="Delete Current Chart">
                <i class="ph ph-trash text-base"></i> Delete
            </button>
        </div>

        <!-- Export -->
        <div class="cb-toolbar-group ml-auto">
            <button class="cb-btn primary" id="cb-btn-export-png" title="Export as PNG">
                <i class="ph ph-image text-base"></i> Export PNG
            </button>
        </div>
    </div>

    <!-- ── Body ─────────────────────────────────────────────────────── -->
    <div class="cb-body flex-1">

        <!-- Center: Chart Preview -->
        <div class="cb-preview">
            <div class="cb-chart-wrapper" id="cb-chart-wrapper">
                <div id="cb-chart-container" class="w-full h-full"></div>
                <!-- Empty State (shown when no chart) -->
                <div id="cb-empty-state" class="cb-empty">
                    <i class="ph ph-chart-line-up"></i>
                    <p>No chart selected</p>
                    <button class="cb-empty-btn" id="cb-btn-empty-new">
                        <i class="ph ph-plus"></i> Create New Chart
                    </button>
                </div>
            </div>
        </div>

        <!-- Right Panel: Options -->
        <div class="cb-options-panel">
            <div class="cb-options-title">Options</div>
            <div id="cb-options-content">
                <!-- Dynamic options generated by chart-options.js -->
            </div>
        </div>

    </div>

    <!-- ── Bottom Panel: Data Editor ─────────────────────────────────── -->
    <div class="cb-data-panel">
        <div class="cb-data-panel-header">
            <div class="cb-data-panel-title">Data</div>
        </div>
        <div class="cb-data-section" id="cb-data-content">
            <!-- Dynamic data editor generated by chart-data.js -->
        </div>
    </div>

</div>

<!-- MODULE SCRIPTS -->
<script src="js/tools/chart-builder/chart-builder.js"></script>
<script>
    requestAnimationFrame(() => {
        if (window.ChartBuilder) {
            window.ChartBuilder.init();
        }
    });
</script>
